version: "2"
run:
  timeout: 5m
  tests: true
  allow-parallel-runners: true
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/Skyscanner/kms-issuer
linters:
  default: none
  enable:
    - bodyclose
    - dogsled
    - dupl
    - errcheck
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - misspell
    - nakedret
    - revive
    - staticcheck
    - unconvert
    - unparam
    - unused
    - whitespace
  settings:
    dupl:
      threshold: 100
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - ifElseChain
        - octalLiteral
        - wrapperFunc
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: dot-imports
          disabled: true
    govet:
      enable:
        - shadow
  exclusions:
    paths:
      - .git
      - deploy
      - config
      - hack
    rules:
      - path: _test\.go
        text: "dot-imports"