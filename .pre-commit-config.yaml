default_stages: [pre-commit]
repos:
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v2.2.1
    hooks:
      - id: prettier
        files: '.md'
        exclude: 'charts/.*'
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.4.0
    hooks:
      - id: check-yaml
        args:
          - --allow-multiple-documents
        exclude: 'charts/.*'
      - id: end-of-file-fixer
        exclude: 'charts/.*/README\.md'
      - id: trailing-whitespace
        exclude: 'charts/.*/README\.md'
  - repo: local
    hooks:
      - id: golangci-lint
        name: Run golangci-lint
        entry: golangci-lint run --timeout 2m
        language: system
        require_serial: true
        files: '.*\.go$'
        types: [go]
        pass_filenames: false
      - id: generate-chart-docs
        name: Generate Helm chart docs
        entry: make generate-chart-docs
        language: system
        require_serial: true
        files: 'charts/.*'
        pass_filenames: false
      - id: fmt
        name: Run go fmt
        entry: make fmt
        language: system
        require_serial: true
        files: '.*\.go$'
        stages:
          - pre-push
      - id: test
        name: Run tests
        entry: make test
        language: system
        require_serial: true
        files: '.*\.go$'
        stages:
          - pre-push
